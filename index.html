<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <meta name="description" content="A four-function calculator with history, percentage, sign toggle, themes and keyboard support." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23667eea'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white'%3E%3D%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator" role="application" aria-label="Calculator">
    <div class="topbar">
      <a class="home" href="../" title="Back to gallery" aria-label="Back to gallery">‹ Gallery</a>
      <button id="themeToggle" class="theme-toggle" title="Toggle theme" aria-label="Toggle light or dark theme">🌙</button>
    </div>

    <div class="display">
      <div id="history" class="history" aria-live="polite"></div>
      <input type="text" id="display" readonly value="0" aria-label="Result" />
    </div>

    <div class="buttons">
      <button class="btn func" onclick="clearAll()">AC</button>
      <button class="btn func" onclick="toggleSign()" aria-label="Toggle sign">±</button>
      <button class="btn func" onclick="percent()" aria-label="Percent">%</button>
      <button class="btn operator" onclick="appendOperator('/')" aria-label="Divide">÷</button>

      <button class="btn" onclick="appendNumber('7')">7</button>
      <button class="btn" onclick="appendNumber('8')">8</button>
      <button class="btn" onclick="appendNumber('9')">9</button>
      <button class="btn operator" onclick="appendOperator('*')" aria-label="Multiply">×</button>

      <button class="btn" onclick="appendNumber('4')">4</button>
      <button class="btn" onclick="appendNumber('5')">5</button>
      <button class="btn" onclick="appendNumber('6')">6</button>
      <button class="btn operator" onclick="appendOperator('-')" aria-label="Subtract">−</button>

      <button class="btn" onclick="appendNumber('1')">1</button>
      <button class="btn" onclick="appendNumber('2')">2</button>
      <button class="btn" onclick="appendNumber('3')">3</button>
      <button class="btn operator" onclick="appendOperator('+')" aria-label="Add">+</button>

      <button class="btn" onclick="appendNumber('0')">0</button>
      <button class="btn" onclick="appendDecimal()">.</button>
      <button class="btn func" onclick="deleteLastChar()" aria-label="Delete">←</button>
      <button class="btn equals" onclick="calculate()" aria-label="Equals">=</button>
    </div>

    <p class="hint">Tip: use your keyboard — digits, <kbd>+ − * /</kbd>, <kbd>Enter</kbd>, <kbd>%</kbd>, <kbd>⌫</kbd>, <kbd>Esc</kbd></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
